    <script>
        // IMPORTANT: Replace this URL with your actual Google Apps Script Web App URL ending in /exec

        let allWorkers = [];

        document.addEventListener('DOMContentLoaded', () => { loadData(); setupEventListeners(); });

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', filterTable);
            document.getElementById('filterCountry').addEventListener('change', filterTable);
            document.getElementById('filterStatus').addEventListener('change', filterTable);
        }

        async function loadData() {
            showLoading();
            try {
                const response = await fetch(`${API_URL}?action=getAll`);
                const result = await response.json();
                if (result.status === 'success') {
                    allWorkers = result.data || [];
                    renderTable(allWorkers);
                    loadStatistics();
                } else {
                    showAlert('Error loading data: ' + result.message, 'error');
                }
            } catch (error) {
                showAlert('Error connecting to server: ' + error.message, 'error');
            }
        }

        async function loadStatistics() {
            try {
                const response = await fetch(`${API_URL}?action=getStats`);
                const result = await response.json();
                if (result.status === 'success') {
                    const stats = result.data;
                    document.getElementById('totalWorkers').textContent = stats.total || 0;
                    document.getElementById('checkInToday').textContent = stats.checkInToday || 0;
                    document.getElementById('checkOutToday').textContent = stats.checkOutToday || 0;
                    document.getElementById('pendingWorkers').textContent = stats.byStatus?.Pending || 0;
                }
            } catch (error) { console.error('Error loading statistics:', error); }
        }

        // FIXED: Uses bracket notation for keys with spaces (e.g., 'Arrival Date')
        function renderTable(workers) {
            const tbody = document.getElementById('tableBody');
            if (!workers || workers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" style="text-align: center; padding: 40px;">No workers found</td></tr>';
                return;
            }
            tbody.innerHTML = workers.map(worker => `
                <tr>
                    <td>${worker.ID || worker.id}</td>
                    <td>${worker.Country || worker.country}</td>
                    <td>${worker.Name || worker.name}</td>
                    <td>${formatDate(worker['Arrival Date'] || worker.ArrivalDate)}</td>
                    <td>${formatDate(worker['End Date'] || worker.EndDate)}</td>
                    <td>${worker['Remaining Days'] || worker.RemainingDays || 0}</td>
                    <td>${worker.Section || worker.section}</td>
                    <td><span class="status-badge status-${getStatusClass(worker.Status || worker.status)}">${worker.Status || worker.status}</span></td>
                    <td>${worker['Reason for Stay'] || worker.Reason || '-'}</td>
                    <td>${worker['Agency Name'] || worker.Agency || '-'}</td>
                    <td>
                        <button class="btn btn-success" onclick="checkIn('${worker.ID || worker.id}')" title="Check In"><i class="fas fa-sign-in-alt"></i></button>
                        <button class="btn btn-warning" onclick="checkOut('${worker.ID || worker.id}')" title="Check Out"><i class="fas fa-sign-out-alt"></i></button>
                        <button class="btn btn-primary" onclick="editWorker('${worker.ID || worker.id}')" title="Edit"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-danger" onclick="deleteWorker('${worker.ID || worker.id}')" title="Delete"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function filterTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const country = document.getElementById('filterCountry').value;
            const status = document.getElementById('filterStatus').value;
            const filtered = allWorkers.filter(worker => {
                const matchSearch = !search || (worker.Name && worker.Name.toLowerCase().includes(search)) || (worker.Country && worker.Country.toLowerCase().includes(search)) || (worker['Agency Name'] && worker['Agency Name'].toLowerCase().includes(search));
                const matchCountry = !country || worker.Country === country;
                const matchStatus = !status || worker.Status === status;
                return matchSearch && matchCountry && matchStatus;
            });
            renderTable(filtered);
        }

        function openModal(workerId = null) {
            document.getElementById('workerModal').classList.add('active');
            document.getElementById('workerForm').reset();
            document.getElementById('workerId').value = '';
            if (workerId) {
                document.getElementById('modalTitle').textContent = 'Edit Worker';
                const worker = allWorkers.find(w => (w.ID || w.id) === workerId);
                if (worker) fillForm(worker);
            } else {
                document.getElementById('modalTitle').textContent = 'Add New Worker';
            }
        }

        function closeModal() { document.getElementById('workerModal').classList.remove('active'); }

        // FIXED: Uses bracket notation for keys with spaces
        function fillForm(worker) {
            document.getElementById('workerId').value = worker.ID || worker.id;
            document.getElementById('country').value = worker.Country || worker.country;
            document.getElementById('name').value = worker.Name || worker.name;
            document.getElementById('arrivalDate').value = formatDateForInput(worker['Arrival Date'] || worker.ArrivalDate);
            document.getElementById('endDate').value = formatDateForInput(worker['End Date'] || worker.EndDate);
            document.getElementById('section').value = worker.Section || worker.section;
            document.getElementById('status').value = worker.Status || worker.status;
            document.getElementById('reason').value = worker['Reason for Stay'] || worker.Reason;
            document.getElementById('agency').value = worker['Agency Name'] || worker.Agency;
            document.getElementById('comments').value = worker.Comments || worker.comments;
        }

        // FIXED: Added Content-Type header to prevent CORS issues
        async function saveWorker(event) {
            event.preventDefault();
            const data = {
                id: document.getElementById('workerId').value,
                country: document.getElementById('country').value,
                name: document.getElementById('name').value,
                arrivalDate: document.getElementById('arrivalDate').value,
                endDate: document.getElementById('endDate').value,
                section: document.getElementById('section').value,
                status: document.getElementById('status').value,
                reason: document.getElementById('reason').value,
                agency: document.getElementById('agency').value,
                comments: document.getElementById('comments').value
            };
            try {
                const action = data.id ? 'update' : 'add';
                const response = await fetch(`${API_URL}?action=${action}`, {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
                });
                const result = await response.json();
                if (result.status === 'success') {
                    closeModal();
                    loadData();
                    showAlert(result.message, 'success');
                } else {
                    showAlert('Error: ' + result.message, 'error');
                }
            } catch (error) {
                showAlert('Error saving worker: ' + error.message, 'error');
            }
        }

        async function checkIn(id) {
            if (!confirm('Check in this worker?')) return;
            try {
                const response = await fetch(`${API_URL}?action=checkIn&id=${id}`, { method: 'POST' });
                const result = await response.json();
                if (result.status === 'success') { loadData(); showAlert('Worker checked in successfully', 'success'); }
                else { showAlert('Error: ' + result.message, 'error'); }
            } catch (error) { showAlert('Error checking in: ' + error.message, 'error'); }
        }

        async function checkOut(id) {
            if (!confirm('Check out this worker?')) return;
            try {
                const response = await fetch(`${API_URL}?action=checkOut&id=${id}`, { method: 'POST' });
                const result = await response.json();
                if (result.status === 'success') { loadData(); showAlert('Worker checked out successfully', 'success'); }
                else { showAlert('Error: ' + result.message, 'error'); }
            } catch (error) { showAlert('Error checking out: ' + error.message, 'error'); }
        }

        async function deleteWorker(id) {
            if (!confirm('Are you sure you want to delete this worker?')) return;
            try {
                const response = await fetch(`${API_URL}?action=delete&id=${id}`, { method: 'POST' });
                const result = await response.json();
                if (result.status === 'success') { loadData(); showAlert('Worker deleted successfully', 'success'); }
                else { showAlert('Error: ' + result.message, 'error'); }
            } catch (error) { showAlert('Error deleting: ' + error.message, 'error'); }
        }

        function editWorker(id) { openModal(id); }

        function getStatusClass(status) {
            const statusMap = { 'New': 'new', 'Returned': 'returned', 'Rejected': 'rejected', 'Contracted': 'contracted', 'Pending': 'pending', 'Final Exit': 'exit' };
            return statusMap[status] || 'pending';
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US');
        }

        function formatDateForInput(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toISOString().split('T')[0];
        }

        function showLoading() {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="11" class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.appendChild(alert);
            setTimeout(() => { alert.remove(); }, 5000);
        }

        document.getElementById('workerModal').addEventListener('click', (e) => {
            if (e.target.id === 'workerModal') { closeModal(); }
        });
    </script>
</body>
