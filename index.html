<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة عقود العمالة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: { 
                        primary: '#0F766E', 
                        active: '#10B981', 
                        warning: '#F59E0B', 
                        expired: '#E11D48', 
                        terminated: '#64748B' 
                    }
                }
            }
        }
    </script>
    <style>
        /* Compact Scrollbar */
        .custom-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.5; padding: 0; }
        .modal-enter-active { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans antialiased text-sm">

    <!-- COMPACT HEADER -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 h-14">
        <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
                    <i class="ph ph-files text-xl"></i>
                </div>
                <h1 class="text-lg font-bold text-slate-900">إدارة العقود</h1>
            </div>
            <button onclick="openModal()" class="bg-primary hover:bg-teal-700 text-white px-3 py-1.5 rounded-lg flex items-center gap-2 transition-all shadow-sm text-xs font-bold">
                <i class="ph ph-plus-circle text-base"></i> عقد جديد
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-4 space-y-4">
        <!-- COMPACT KPI CARDS -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
            <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                <p class="text-slate-500 text-[10px] uppercase tracking-wider mb-1">نشط</p>
                <p id="kpi-active" class="text-2xl font-bold text-slate-900">-</p>
            </div>
            <div class="bg-white p-3 rounded-lg border border-active/30 shadow-sm cursor-pointer hover:bg-active/5" onclick="filterByStatus('new')">
                <p class="text-active text-[10px] uppercase tracking-wider mb-1">جديدة (5 أيام)</p>
                <p id="kpi-new" class="text-2xl font-bold text-active">-</p>
            </div>
            <div class="bg-white p-3 rounded-lg border border-warning/30 shadow-sm cursor-pointer hover:bg-warning/5" onclick="filterByStatus('ending')">
                <p class="text-warning text-[10px] uppercase tracking-wider mb-1">تنتهي قريباً</p>
                <p id="kpi-ending" class="text-2xl font-bold text-warning">-</p>
            </div>
            <div class="bg-white p-3 rounded-lg border border-expired/30 shadow-sm cursor-pointer hover:bg-expired/5" onclick="filterByStatus('expired')">
                <p class="text-expired text-[10px] uppercase tracking-wider mb-1">منتهية (تاريخ)</p>
                <p id="kpi-expired" class="text-2xl font-bold text-expired">-</p>
            </div>
            <div class="bg-white p-3 rounded-lg border border-terminated/30 shadow-sm cursor-pointer hover:bg-terminated/5" onclick="filterByStatus('terminated')">
                <p class="text-terminated text-[10px] uppercase tracking-wider mb-1">مرتجعة/رافضة</p>
                <p id="kpi-terminated" class="text-2xl font-bold text-terminated">-</p>
            </div>
        </div>

        <!-- SEARCH & FILTER -->
        <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col sm:flex-row gap-2">
            <div class="relative flex-1">
                <i class="ph ph-magnifying-glass absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="بحث سريع..." 
                    class="w-full pr-9 pl-3 py-2 bg-slate-50 border border-slate-200 rounded-md focus:outline-none focus:border-primary text-xs"
                    oninput="applyFilters()">
            </div>
            <select id="statusFilter" onchange="applyFilters()" class="px-3 py-2 bg-slate-50 border border-slate-200 rounded-md text-xs focus:outline-none focus:border-primary cursor-pointer w-full sm:w-auto">
                <option value="all">جميع الحالات</option>
                <option value="active">نشط</option>
                <option value="ending">تنتهي قريباً</option>
                <option value="expired">منتهية (تاريخ)</option>
                <option value="terminated">مرتجعة / رافضة</option>
            </select>
        </div>

        <!-- DENSE DATA TABLE -->
        <div class="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto custom-scroll">
                <table class="w-full text-right whitespace-nowrap">
                    <thead class="bg-slate-50 text-slate-500 font-semibold border-b border-slate-200 text-[11px] uppercase tracking-wider">
                        <tr>
                            <th class="px-3 py-2 w-10">م</th>
                            <th class="px-3 py-2">العاملة</th>
                            <th class="px-3 py-2">الإقامة</th>
                            <th class="px-3 py-2">صاحب العمل</th>
                            <th class="px-3 py-2">البداية</th>
                            <th class="px-3 py-2">النهاية</th>
                            <th class="px-3 py-2 w-24">الحالة</th>
                            <th class="px-3 py-2 text-center w-20">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 text-xs">
                        <tr><td colspan="8" class="px-6 py-8 text-center text-slate-400">
                            <i class="ph ph-spinner animate-spin text-xl mb-1 block mx-auto"></i> جاري التحميل...
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODALS (Kept same structure but updated logic in JS) -->
    <div id="contractModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
            <div class="bg-white w-full max-w-md rounded-xl shadow-2xl pointer-events-auto modal-enter-active overflow-hidden">
                <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                    <h2 id="modalTitle" class="text-base font-bold text-slate-900">عقد جديد</h2>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="ph ph-x text-lg"></i></button>
                </div>
                <form id="contractForm" onsubmit="handleSubmit(event)" class="p-4 space-y-3">
                    <input type="hidden" id="editId">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-bold text-slate-500 mb-1">اسم العاملة</label>
                            <input required type="text" id="workerName" class="w-full px-2 py-1.5 bg-slate-50 border border-slate-200 rounded text-xs focus:border-primary outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 mb-1">رقم الإقامة</label>
                            <input required type="text" id="iqamaNumber" pattern="\d{10}" class="w-full px-2 py-1.5 bg-slate-50 border border-slate-200 rounded text-xs focus:border-primary outline-none ltr text-right">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 mb-1">صاحب العمل</label>
                            <input required type="text" id="employer" class="w-full px-2 py-1.5 bg-slate-50 border border-slate-200 rounded text-xs focus:border-primary outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 mb-1">بداية العقد</label>
                            <input required type="date" id="startDate" onchange="calculateDuration()" class="w-full px-2 py-1.5 bg-slate-50 border border-slate-200 rounded text-xs focus:border-primary outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 mb-1">نهاية العقد</label>
                            <input required type="date" id="endDate" onchange="calculateDuration()" class="w-full px-2 py-1.5 bg-slate-50 border border-slate-200 rounded text-xs focus:border-primary outline-none">
                        </div>
                    </div>
                    <div id="durationBadge" class="hidden bg-primary/5 text-primary px-2 py-1 rounded text-[10px] font-medium flex items-center gap-1">
                        <i class="ph ph-calendar-check"></i> <span id="durationText"></span>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-primary hover:bg-teal-700 text-white py-2 rounded-lg font-bold text-xs transition-all mt-2">
                        حفظ البيانات
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="statusModal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeStatusModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
            <div class="bg-white w-full max-w-xs rounded-xl shadow-2xl pointer-events-auto p-4 text-center">
                <h3 class="text-sm font-bold mb-3">تحديث الحالة اليدوي</h3>
                <div class="grid grid-cols-1 gap-2">
                    <button onclick="updateStatusAction('Returned')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded text-xs font-medium">مرتجع من العميل</button>
                    <button onclick="updateStatusAction('Rejected')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded text-xs font-medium">رافض للعمل</button>
                    <button onclick="updateStatusAction('Active')" class="bg-active/10 hover:bg-active/20 text-active py-2 rounded text-xs font-medium">تفعيل العقد مجدداً</button>
                </div>
                <button onclick="closeStatusModal()" class="mt-3 text-slate-400 text-[10px] hover:text-slate-600">إغلاق</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 left-4 z-[70] translate-y-20 opacity-0 transition-all duration-300">
        <div class="bg-slate-900 text-white px-3 py-2 rounded-lg shadow-xl flex items-center gap-2 text-xs font-medium">
            <i id="toastIcon" class="ph ph-check-circle text-active"></i>
            <span id="toastMsg">تم الحفظ</span>
        </div>
    </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyw7gf9PDoOpAU5ux6V1JLmhgIYpNGA7DkcIVo4OHIXny4p0hJqlGUIOUE7PJhBwIar/exec";
let allContracts = [];
let currentStatusUpdateId = null;

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('startDate').valueAsDate = new Date();
    fetchData();
});

async function fetchData() {
    try {
        const res = await fetch(`${API_URL}?action=get`, { redirect: 'follow' });
        const data = await res.json();
        if (data.success) {
            allContracts = data.contracts.map(c => ({
                id: c[0], workerName: c[1], iqama: String(c[2]), employer: c[3],
                start: formatDateForDisplay(c[4]), end: formatDateForDisplay(c[5]),
                status: c[6], rawStart: c[4], rawEnd: c[5]
            }));
            applyFilters();
        }
    } catch (err) { showToast("خطأ في الاتصال", "error"); }
}

function formatDateForDisplay(dateVal) {
    if (!dateVal) return "";
    const d = new Date(dateVal);
    return `${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}/${d.getFullYear()}`;
}

// --- CORE LOGIC UPDATE ---
function getStatusLogic(c) {
    // 1. Normalize "Today" to midnight local time
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // 2. Parse Start and End dates from sheet
    // We create new Date objects and immediately zero out the time to ensure fair comparison
    const start = new Date(c.rawStart);
    start.setHours(0, 0, 0, 0);

    const end = new Date(c.rawEnd);
    end.setHours(0, 0, 0, 0);

    // 3. Calculate differences in days
    // One day in milliseconds = 1000 * 60 * 60 * 24
    const oneDay = 1000 * 60 * 60 * 24;
    
    const diffTimeStart = today.getTime() - start.getTime();
    const daysSinceStart = Math.ceil(diffTimeStart / oneDay);

    const diffTimeEnd = end.getTime() - today.getTime();
    const daysUntilEnd = Math.ceil(diffTimeEnd / oneDay);

    let isExpired = false;
    let isTerminated = false;

    // 4. Determine Status
    if (c.status === 'Returned' || c.status === 'Rejected') {
        isTerminated = true;
    } 
    else if (daysUntilEnd < 0) {
        // End date has passed
        isExpired = true;
    }

    // 5. Determine "New" (Started within last 5 days, including today)
    // daysSinceStart >= 0 ensures we don't count future contracts as "New"
    const isNew = (!isExpired && !isTerminated && daysSinceStart >= 0 && daysSinceStart <= 5);

    // 6. Determine "Ending Soon" (Ends within next 5 days)
    const isEndingSoon = (!isExpired && !isTerminated && daysUntilEnd >= 0 && daysUntilEnd <= 5);

    return {
        display: c.status,
        isExpired: isExpired,
        isTerminated: isTerminated,
        isNew: isNew,
        isEndingSoon: isEndingSoon,
        daysRemaining: daysUntilEnd
    };
}

function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filterType = document.getElementById('statusFilter').value;
    
    const filtered = allContracts.filter(c => {
        const logic = getStatusLogic(c);
        const matchSearch = String(c.workerName).toLowerCase().includes(search) || 
                           String(c.iqama).includes(search) || 
                           String(c.employer).toLowerCase().includes(search);
        
        let matchFilter = true;
        if (filterType === 'active') matchFilter = !logic.isExpired && !logic.isTerminated;
        else if (filterType === 'ending') matchFilter = logic.isEndingSoon;
        else if (filterType === 'expired') matchFilter = logic.isExpired;
        else if (filterType === 'terminated') matchFilter = logic.isTerminated;
        else if (filterType === 'new') matchFilter = logic.isNew;
        
        return matchSearch && matchFilter;
    });
    
    renderTable(filtered);
    updateKPIs();
}

function renderTable(contracts) {
    const tbody = document.getElementById('tableBody');
    if (contracts.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-8 text-center text-slate-400 text-xs">لا توجد نتائج</td></tr>`;
        return;
    }
    
    tbody.innerHTML = contracts.map(c => {
        const logic = getStatusLogic(c);
        let stCls = 'bg-emerald-50 text-emerald-700 border-emerald-200';
        let stLabel = 'نشط';
        
        if (logic.isTerminated) {
            stCls = 'bg-slate-100 text-slate-600 border-slate-200';
            stLabel = c.status === 'Returned' ? 'مرتجع' : 'رافض';
        } else if (logic.isExpired) {
            stCls = 'bg-rose-50 text-rose-700 border-rose-200';
            stLabel = 'منتهي';
        } else if (logic.isEndingSoon) {
            stCls = 'bg-amber-50 text-amber-700 border-amber-200';
            stLabel = 'ينتهي قريباً';
        }
        
        return `
        <tr class="hover:bg-slate-50 transition-colors group">
            <td class="px-3 py-2 font-mono text-slate-400">${c.id}</td>
            <td class="px-3 py-2 font-bold text-slate-900">${c.workerName}</td>
            <td class="px-3 py-2 font-mono text-slate-600">${c.iqama}</td>
            <td class="px-3 py-2 text-slate-600">${c.employer}</td>
            <td class="px-3 py-2 text-slate-500 font-mono">${c.start}</td>
            <td class="px-3 py-2 text-slate-500 font-mono">${c.end}</td>
            <td class="px-3 py-2"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold border ${stCls}">${stLabel}</span></td>
            <td class="px-3 py-2 text-center">
                <div class="flex items-center justify-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick='editContract(${JSON.stringify(c).replace(/'/g, "&#39;")})' class="p-1 text-blue-600 hover:bg-blue-50 rounded" title="تعديل">
                        <i class="ph ph-pencil-simple"></i>
                    </button>
                    <button onclick='openStatusModal(${c.id})' class="p-1 text-slate-500 hover:bg-slate-100 rounded" title="حالة">
                        <i class="ph ph-clock-countdown"></i>
                    </button>
                </div>
            </td>
        </tr>`;
    }).join('');
}

function updateKPIs() {
    let active = 0, ending = 0, newC = 0, expired = 0, terminated = 0;
    allContracts.forEach(c => {
        const logic = getStatusLogic(c);
        if (logic.isTerminated) terminated++;
        else if (logic.isExpired) expired++;
        else {
            active++;
            if (logic.isNew) newC++;
            if (logic.isEndingSoon) ending++;
        }
    });
    document.getElementById('kpi-active').textContent = active;
    document.getElementById('kpi-new').textContent = newC;
    document.getElementById('kpi-ending').textContent = ending;
    document.getElementById('kpi-expired').textContent = expired;
    document.getElementById('kpi-terminated').textContent = terminated;
}

// --- ACTIONS ---
async function saveContract(payload) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerText = 'جاري الحفظ...';
    try {
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: payload.id ? 'update' : 'create', payload }) });
        showToast("تم الحفظ بنجاح"); closeModal(); fetchData();
    } catch (err) { showToast("فشل الحفظ", "error"); }
    finally { btn.disabled = false; btn.innerText = 'حفظ البيانات'; }
}

async function updateStatusAction(newStatus) {
    if (!currentStatusUpdateId) return;
    try {
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'updateStatus', payload: { id: currentStatusUpdateId, newStatus } }) });
        showToast(`تم التحديث إلى ${newStatus}`); closeStatusModal(); fetchData();
    } catch (err) { showToast("فشل التحديث", "error"); }
}

// --- UTILS ---
function openModal(data = null) {
    const form = document.getElementById('contractForm'); form.reset();
    document.getElementById('durationBadge').classList.add('hidden');
    document.getElementById('startDate').valueAsDate = new Date();
    if (data) {
        document.getElementById('modalTitle').innerText = 'تعديل العقد';
        document.getElementById('editId').value = data.id;
        document.getElementById('workerName').value = data.workerName;
        document.getElementById('iqamaNumber').value = data.iqama;
        document.getElementById('employer').value = data.employer;
        if(data.start) document.getElementById('startDate').value = convertToISO(data.start);
        if(data.end) document.getElementById('endDate').value = convertToISO(data.end);
        calculateDuration();
    } else {
        document.getElementById('modalTitle').innerText = 'عقد جديد';
        document.getElementById('editId').value = '';
    }
    document.getElementById('contractModal').classList.remove('hidden');
}

function convertToISO(dateStr) {
    if(!dateStr) return "";
    const [m, d, y] = dateStr.split('/');
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
}

function closeModal() { document.getElementById('contractModal').classList.add('hidden'); }
function editContract(data) { openModal(data); }
function openStatusModal(id) { currentStatusUpdateId = id; document.getElementById('statusModal').classList.remove('hidden'); }
function closeStatusModal() { document.getElementById('statusModal').classList.add('hidden'); currentStatusUpdateId = null; }
function handleSubmit(e) { e.preventDefault(); saveContract({ id: document.getElementById('editId').value || null, workerName: document.getElementById('workerName').value, iqama: document.getElementById('iqamaNumber').value, employer: document.getElementById('employer').value, startDate: document.getElementById('startDate').value, endDate: document.getElementById('endDate').value }); }
function calculateDuration() {
    const s = document.getElementById('startDate').value; const e = document.getElementById('endDate').value;
    if (s && e) {
        const months = (new Date(e).getFullYear() - new Date(s).getFullYear()) * 12 + (new Date(e).getMonth() - new Date(s).getMonth());
        document.getElementById('durationText').innerText = `المدة: ${months} شهر`;
        document.getElementById('durationBadge').classList.remove('hidden');
    } else { document.getElementById('durationBadge').classList.add('hidden'); }
}
function filterByStatus(status) { document.getElementById('statusFilter').value = status; applyFilters(); }
function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').innerText = msg;
    document.getElementById('toastIcon').className = type === 'error' ? 'ph ph-warning-circle text-expired' : 'ph ph-check-circle text-active';
    t.classList.remove('translate-y-20', 'opacity-0');
    setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 2500);
}
</script>
</body>
</html>
