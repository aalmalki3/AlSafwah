<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة عقود العمالة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: { primary: '#0F766E', active: '#10B981', warning: '#F59E0B', expired: '#E11D48', returned: '#64748B' }
                }
            }
        }
    </script>
    <style>
        .custom-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        /* Force calendar icon visibility */
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans antialiased">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center text-primary">
                    <i class="ph ph-files text-2xl"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-900">إدارة عقود العمالة</h1>
            </div>
            <button onclick="openModal()" class="bg-primary hover:bg-teal-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-all shadow-sm text-sm font-medium">
                <i class="ph ph-plus-circle text-lg"></i> عقد جديد
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
        <!-- KPI CARDS -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <p class="text-slate-500 text-sm mb-1">العقود النشطة</p>
                <p id="kpi-active" class="text-3xl font-bold text-slate-900">-</p>
            </div>
            <div class="bg-white p-5 rounded-xl border border-warning/30 shadow-sm cursor-pointer hover:border-warning transition-colors" onclick="filterByStatus('expiring')">
                <p class="text-warning text-sm mb-1">تنتهي خلال 5 أيام</p>
                <p id="kpi-expiring" class="text-3xl font-bold text-warning">-</p>
            </div>
            <div class="bg-white p-5 rounded-xl border border-active/30 shadow-sm cursor-pointer hover:border-active transition-colors" onclick="filterByStatus('new')">
                <p class="text-active text-sm mb-1">جديدة (آخر 5 أيام)</p>
                <p id="kpi-new" class="text-3xl font-bold text-active">-</p>
            </div>
            <div class="bg-white p-5 rounded-xl border border-expired/30 shadow-sm cursor-pointer hover:border-expired transition-colors" onclick="filterByStatus('expired')">
                <p class="text-expired text-sm mb-1">منتهية / مرتجعة</p>
                <p id="kpi-expired" class="text-3xl font-bold text-expired">-</p>
            </div>
        </div>

        <!-- SEARCH & FILTER -->
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col sm:flex-row gap-3">
            <div class="relative flex-1">
                <i class="ph ph-magnifying-glass absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="بحث بالاسم، رقم الإقامة، أو صاحب العمل..." 
                    class="w-full pr-10 pl-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm"
                    oninput="applyFilters()">
            </div>
            <select id="statusFilter" onchange="applyFilters()" class="px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-primary cursor-pointer">
                <option value="all">جميع الحالات</option>
                <option value="active">نشط</option>
                <option value="expiring">قريب الانتهاء (5 أيام)</option>
                <option value="new">جديدة (5 أيام)</option>
                <option value="expired">منتهية / مرتجعة</option>
            </select>
        </div>

        <!-- DATA TABLE -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto custom-scroll">
                <table class="w-full text-sm text-right">
                    <thead class="bg-slate-50 text-slate-500 font-medium border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4">م</th>
                            <th class="px-6 py-4">اسم العاملة</th>
                            <th class="px-6 py-4">رقم الإقامة</th>
                            <th class="px-6 py-4">صاحب العمل</th>
                            <th class="px-6 py-4">بداية العقد</th>
                            <th class="px-6 py-4">نهاية العقد</th>
                            <th class="px-6 py-4">الحالة</th>
                            <th class="px-6 py-4 text-center w-48">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        <tr><td colspan="8" class="px-6 py-12 text-center text-slate-400">
                            <i class="ph ph-spinner animate-spin text-2xl mb-2 block mx-auto"></i> جاري التحميل...
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODAL -->
    <div id="contractModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
            <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl pointer-events-auto modal-enter-active overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                    <h2 id="modalTitle" class="text-lg font-bold text-slate-900">عقد جديد</h2>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="ph ph-x text-xl"></i></button>
                </div>
                <form id="contractForm" onsubmit="handleSubmit(event)" class="p-6 space-y-4">
                    <input type="hidden" id="editId">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="block text-xs font-medium text-slate-500 mb-1.5">اسم العاملة</label>
                            <input required type="text" id="workerName" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1.5">رقم الإقامة</label>
                            <input required type="text" id="iqamaNumber" pattern="\d{10}" title="10 أرقام فقط" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm ltr text-right">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1.5">صاحب العمل</label>
                            <input required type="text" id="employer" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1.5">تاريخ البداية</label>
                            <!-- Calendar Only -->
                            <input required type="date" id="startDate" onchange="calculateDuration()" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1.5">تاريخ النهاية</label>
                            <!-- Calendar Only -->
                            <input required type="date" id="endDate" onchange="calculateDuration()" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm">
                        </div>
                    </div>
                    <div id="durationBadge" class="hidden bg-primary/5 text-primary px-3 py-2 rounded-lg text-xs font-medium flex items-center gap-2">
                        <i class="ph ph-calendar-check"></i> <span id="durationText"></span>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-primary hover:bg-teal-700 text-white py-3 rounded-xl font-bold text-sm transition-all shadow-lg shadow-primary/20 mt-2 flex items-center justify-center gap-2">
                        <span>حفظ العقد</span> <i class="ph ph-check-circle text-lg"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- STATUS UPDATE MODAL -->
    <div id="statusModal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeStatusModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
            <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl pointer-events-auto p-6 text-center">
                <h3 class="text-lg font-bold mb-4">تحديث حالة العقد</h3>
                <p class="text-slate-500 text-sm mb-6">هل تريد تغيير حالة هذا العقد؟</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="updateStatusAction('Returned')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-lg text-sm font-medium">مرتجع من العميل</button>
                    <button onclick="updateStatusAction('Rejected')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-lg text-sm font-medium">رافض للعمل</button>
                    <button onclick="updateStatusAction('Expired')" class="bg-expired/10 hover:bg-expired/20 text-expired py-2 rounded-lg text-sm font-medium col-span-2">منتهي الصلاحية</button>
                </div>
                <button onclick="closeStatusModal()" class="mt-4 text-slate-400 text-sm hover:text-slate-600">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-6 left-6 z-[70] translate-y-20 opacity-0 transition-all duration-300">
        <div class="bg-slate-900 text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 text-sm font-medium">
            <i id="toastIcon" class="ph ph-check-circle text-active text-lg"></i>
            <span id="toastMsg">تم الحفظ بنجاح</span>
        </div>
    </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyw7gf9PDoOpAU5ux6V1JLmhgIYpNGA7DkcIVo4OHIXny4p0hJqlGUIOUE7PJhBwIar/exec";

let allContracts = [];
let currentStatusUpdateId = null;

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('startDate').valueAsDate = new Date();
    fetchData();
});

async function fetchData() {
    try {
        const res = await fetch(`${API_URL}?action=get`, { redirect: 'follow' });
        const data = await res.json();
        
        if (data.success) {
            allContracts = data.contracts.map(c => {
                // c[4] and c[5] are dates from sheet. We parse them to avoid timezone issues.
                const startStr = formatDateForDisplay(c[4]);
                const endStr = formatDateForDisplay(c[5]);
                
                return {
                    id: c[0], workerName: c[1], iqama: String(c[2]), employer: c[3],
                    start: startStr, end: endStr, status: c[6], rawStart: c[4], rawEnd: c[5]
                };
            });
            applyFilters();
        }
    } catch (err) {
        console.error(err);
        showToast("خطأ في الاتصال", "error");
    }
}

// Helper to format YYYY-MM-DD or Date Object to MM/DD/YYYY without Timezone shift
function formatDateForDisplay(dateVal) {
    if (!dateVal) return "";
    const d = new Date(dateVal);
    // Adjust for timezone offset to get local date parts
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const year = d.getFullYear();
    return `${month}/${day}/${year}`;
}

async function saveContract(payload) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> جاري الحفظ...';
    
    try {
        const action = payload.id ? 'update' : 'create';
        await fetch(API_URL, {
            method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: action, payload: payload })
        });
        showToast(payload.id ? "تم التعديل" : "تم الإنشاء");
        closeModal();
        fetchData();
    } catch (err) {
        showToast("فشل الحفظ", "error");
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>حفظ العقد</span><i class="ph ph-check-circle text-lg"></i>';
    }
}

async function updateStatusAction(newStatus) {
    if (!currentStatusUpdateId) return;
    
    try {
        await fetch(API_URL, {
            method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'updateStatus', payload: { id: currentStatusUpdateId, newStatus: newStatus } })
        });
        showToast(`تم تحديث الحالة إلى ${newStatus}`);
        closeStatusModal();
        fetchData();
    } catch (err) {
        showToast("فشل التحديث", "error");
    }
}

// --- LOGIC ---
function getStatusLogic(c) {
    const today = new Date(); 
    today.setHours(0,0,0,0);
    
    // Parse the raw date from the sheet to ensure accuracy
    const end = new Date(c.rawEnd);
    const start = new Date(c.rawStart);
    
    // Calculate days passed since the contract ended
    const diffEnd = Math.ceil((today - end) / (1000 * 60 * 60 * 24));
    
    // Calculate days since the contract started (for "New" logic)
    const diffStart = Math.ceil((today - start) / (1000 * 60 * 60 * 24));
    
    let displayStatus = c.status; // Default to the status stored in the DB
    
    // LOGIC UPDATE: Only mark as Expired if 30 days have passed since the end date
    if (c.status === 'Active') {
        if (diffEnd > 30) {
            displayStatus = 'Expired';
        } else if (diffEnd >= 0 && diffEnd <= 30) {
            // Optional: You can call this "Grace Period" or keep it as Active/Expiring
            displayStatus = 'Expiring'; 
        }
    }
    
    return {
        display: displayStatus,
        isExpiring: (displayStatus === 'Expiring'),
        isNew: (c.status === 'Active' && diffStart <= 5 && diffStart >= 0),
        isExpired: (displayStatus === 'Expired' || c.status === 'Returned' || c.status === 'Rejected')
    };
}
function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filterType = document.getElementById('statusFilter').value;
    
    const filtered = allContracts.filter(c => {
        const logic = getStatusLogic(c);
        
        // Search Logic (Convert everything to string to ensure numbers/dates are searchable)
        const matchSearch = String(c.workerName).toLowerCase().includes(search) || 
                           String(c.iqama).includes(search) || 
                           String(c.employer).toLowerCase().includes(search) ||
                           String(c.start).includes(search);
        
        let matchFilter = true;
        if (filterType === 'active') matchFilter = !logic.isExpired;
        else if (filterType === 'expiring') matchFilter = logic.isExpiring;
        else if (filterType === 'new') matchFilter = logic.isNew;
        else if (filterType === 'expired') matchFilter = logic.isExpired;
        
        return matchSearch && matchFilter;
    });
    
    renderTable(filtered);
    updateKPIs();
}

function renderTable(contracts) {
    const tbody = document.getElementById('tableBody');
    if (contracts.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-12 text-center text-slate-400">لا توجد نتائج</td></tr>`;
        return;
    }
    
    tbody.innerHTML = contracts.map(c => {
        const logic = getStatusLogic(c);
        let stCls = 'bg-emerald-50 text-emerald-700 border-emerald-200';
        let stLabel = 'نشط';
        
        if (logic.isExpired) { stCls = 'bg-rose-50 text-rose-700 border-rose-200'; stLabel = c.status; }
        else if (logic.isExpiring) { stCls = 'bg-amber-50 text-amber-700 border-amber-200'; stLabel = 'ينتهي قريباً'; }
        
        return `
        <tr class="hover:bg-slate-50/80 transition-colors group">
            <td class="px-6 py-4 font-mono text-slate-400 text-xs">${c.id}</td>
            <td class="px-6 py-4 font-bold text-slate-900">${c.workerName}</td>
            <td class="px-6 py-4 font-mono text-slate-600 tracking-wide">${c.iqama}</td>
            <td class="px-6 py-4 text-slate-600">${c.employer}</td>
            <td class="px-6 py-4 text-slate-500 text-xs font-mono">${c.start}</td>
            <td class="px-6 py-4 text-slate-500 text-xs font-mono">${c.end}</td>
            <td class="px-6 py-4"><span class="px-2.5 py-1 rounded-full text-xs font-bold border ${stCls}">${stLabel}</span></td>
            <td class="px-6 py-4 text-center">
                <div class="flex items-center justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick='editContract(${JSON.stringify(c).replace(/'/g, "&#39;")})' class="p-1.5 text-blue-600 hover:bg-blue-50 rounded-lg" title="بيانات العقد">
                        <i class="ph ph-pencil-simple text-lg"></i>
                    </button>
                    <button onclick='openStatusModal(${c.id})' class="p-1.5 text-slate-600 hover:bg-slate-100 rounded-lg" title="حالة الانتهاء">
                        <i class="ph ph-clock-countdown text-lg"></i>
                    </button>
                </div>
            </td>
        </tr>`;
    }).join('');
}

function updateKPIs() {
    let active = 0, expiring = 0, newC = 0, expired = 0;
    
    allContracts.forEach(c => {
        const logic = getStatusLogic(c);
        if (logic.isExpired) expired++;
        else {
            active++;
            if (logic.isExpiring) expiring++;
            if (logic.isNew) newC++;
        }
    });
    
    document.getElementById('kpi-active').textContent = active;
    document.getElementById('kpi-expiring').textContent = expiring;
    document.getElementById('kpi-new').textContent = newC;
    document.getElementById('kpi-expired').textContent = expired;
}

// --- MODALS ---
function openModal(data = null) {
    const form = document.getElementById('contractForm');
    form.reset();
    document.getElementById('durationBadge').classList.add('hidden');
    document.getElementById('startDate').valueAsDate = new Date();
    
    if (data) {
        document.getElementById('modalTitle').textContent = 'تعديل العقد';
        document.getElementById('editId').value = data.id;
        document.getElementById('workerName').value = data.workerName;
        document.getElementById('iqamaNumber').value = data.iqama;
        document.getElementById('employer').value = data.employer;
        // Convert MM/DD/YYYY back to YYYY-MM-DD for input[type=date]
        if(data.start) document.getElementById('startDate').value = convertToISO(data.start);
        if(data.end) document.getElementById('endDate').value = convertToISO(data.end);
        calculateDuration();
    } else {
        document.getElementById('modalTitle').textContent = 'عقد جديد';
        document.getElementById('editId').value = '';
    }
    document.getElementById('contractModal').classList.remove('hidden');
}

function convertToISO(dateStr) {
    if(!dateStr) return "";
    const [m, d, y] = dateStr.split('/');
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
}

function closeModal() { document.getElementById('contractModal').classList.add('hidden'); }
function editContract(data) { openModal(data); }

function openStatusModal(id) {
    currentStatusUpdateId = id;
    document.getElementById('statusModal').classList.remove('hidden');
}
function closeStatusModal() { 
    document.getElementById('statusModal').classList.add('hidden'); 
    currentStatusUpdateId = null;
}

function handleSubmit(e) {
    e.preventDefault();
    saveContract({
        id: document.getElementById('editId').value || null,
        workerName: document.getElementById('workerName').value,
        iqama: document.getElementById('iqamaNumber').value,
        employer: document.getElementById('employer').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value
    });
}

function calculateDuration() {
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    const badge = document.getElementById('durationBadge');
    if (start && end) {
        const s = new Date(start); const e = new Date(end);
        const months = (e.getFullYear() - s.getFullYear()) * 12 + (e.getMonth() - s.getMonth());
        document.getElementById('durationText').textContent = `مدة العقد: ${months} شهر`;
        badge.classList.remove('hidden');
    } else { badge.classList.add('hidden'); }
}

function filterByStatus(status) { 
    document.getElementById('statusFilter').value = status; 
    applyFilters(); 
}

function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    document.getElementById('toastIcon').className = type === 'error' ? 'ph ph-warning-circle text-expired text-lg' : 'ph ph-check-circle text-active text-lg';
    toast.classList.remove('translate-y-20', 'opacity-0');
    setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
}
</script>
</body>
</html>
