<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Hub - Collaborative Request Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass-panel { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .status-badge { transition: all 0.2s; }
        .request-card { transition: all 0.2s; }
        .request-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .comment-bubble { position: relative; }
        .comment-bubble::before { content: ''; position: absolute; left: -6px; top: 12px; width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-right: 6px solid #f3f4f6; }
        .hr-comment::before { border-right-color: #eff6ff; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .priority-urgent { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .priority-high { background: #ffedd5; color: #9a3412; border: 1px solid #fed7aa; }
        .priority-medium { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .priority-low { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-inprogress { background: #dbeafe; color: #1e40af; }
        .status-waiting { background: #f3e8ff; color: #6b21a8; }
        .status-resolved { background: #d1fae5; color: #065f46; }
        .status-closed { background: #f3f4f6; color: #374151; }
        .sidebar-link.active { background: #eff6ff; color: #2563eb; border-right: 3px solid #2563eb; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800">
    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-800">
        <div class="w-full max-w-md p-8 mx-4 bg-white rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto mb-4 bg-blue-100 rounded-2xl flex items-center justify-center">
                    <i data-lucide="users" class="w-8 h-8 text-blue-600"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">HR Hub</h1>
                <p class="text-gray-500 mt-1">Collaborative Request Management</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                    <input type="text" id="loginName" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Enter your name">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                    <select id="loginDept" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                        <option value="">Select Department</option>
                        <option value="Sales">Sales</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Product">Product</option>
                        <option value="Finance">Finance</option>
                        <option value="Operations">Operations</option>
                        <option value="HR">Human Resources</option>
                        <option value="Legal">Legal</option>
                        <option value="Customer Success">Customer Success</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">I am a...</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setRole('depthead')" id="btnDeptHead" class="role-btn p-4 border-2 border-gray-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition text-center">
                            <i data-lucide="user" class="w-6 h-6 mx-auto mb-2 text-gray-400"></i>
                            <span class="text-sm font-medium">Department Head</span>
                        </button>
                        <button onclick="setRole('hr')" id="btnHR" class="role-btn p-4 border-2 border-gray-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition text-center">
                            <i data-lucide="shield" class="w-6 h-6 mx-auto mb-2 text-gray-400"></i>
                            <span class="text-sm font-medium">HR Team</span>
                        </button>
                    </div>
                </div>

                <button onclick="performLogin()" class="w-full py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition shadow-lg shadow-blue-600/30">
                    Enter Dashboard
                </button>
            </div>

            <div class="mt-6 p-4 bg-blue-50 rounded-lg text-xs text-blue-700">
                <strong>Demo Tip:</strong> Select "HR Team" to manage all requests, or "Department Head" to submit and track your department's requests.
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <!-- Top Navigation -->
        <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                            <i data-lucide="users" class="w-5 h-5 text-white"></i>
                        </div>
                        <div>
                            <h1 class="text-xl font-bold text-gray-900">HR Hub</h1>
                            <p class="text-xs text-gray-500" id="userInfo">Loading...</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="showNotifications()" class="relative p-2 text-gray-500 hover:text-gray-700 transition">
                            <i data-lucide="bell" class="w-5 h-5"></i>
                            <span id="notifBadge" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full hidden pulse-dot"></span>
                        </button>
                        <button onclick="logout()" class="p-2 text-gray-500 hover:text-gray-700 transition">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex gap-6">
                <!-- Sidebar -->
                <aside class="w-64 shrink-0">
                    <div class="glass-panel rounded-2xl shadow-sm p-4 sticky top-24">
                        <nav class="space-y-1" id="sidebarNav">
                            <!-- Dynamic sidebar content -->
                        </nav>

                        <div class="mt-8 pt-6 border-t border-gray-200">
                            <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Quick Stats</h3>
                            <div id="quickStats" class="space-y-3">
                                <!-- Dynamic stats -->
                            </div>
                        </div>
                    </div>
                </aside>

                <!-- Main Content -->
                <main class="flex-1 min-w-0">
                    <div id="mainContent">
                        <!-- Dynamic content -->
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- New Request Modal -->
    <div id="requestModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="fixed inset-0 bg-black/50 backdrop-blur-sm" onclick="closeRequestModal()"></div>
            <div class="relative bg-white rounded-2xl shadow-2xl max-w-2xl w-full p-6 slide-in">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-900">New HR Request</h2>
                    <button onclick="closeRequestModal()" class="p-2 hover:bg-gray-100 rounded-lg transition">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <form id="requestForm" onsubmit="submitRequest(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Request Title</label>
                        <input type="text" id="reqTitle" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., New hire onboarding for Q3">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                            <select id="reqCategory" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="">Select Category</option>
                                <option value="Hiring & Recruitment">Hiring & Recruitment</option>
                                <option value="Onboarding">Onboarding</option>
                                <option value="Compensation & Benefits">Compensation & Benefits</option>
                                <option value="Training & Development">Training & Development</option>
                                <option value="Employee Relations">Employee Relations</option>
                                <option value="Policy & Compliance">Policy & Compliance</option>
                                <option value="Equipment & Access">Equipment & Access</option>
                                <option value="Document Request">Document Request</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
                            <select id="reqPriority" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="Low">Low</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="High">High</option>
                                <option value="Urgent">Urgent</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <textarea id="reqDescription" required rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="Describe your request in detail..."></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Desired Due Date</label>
                        <input type="date" id="reqDueDate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div class="flex justify-end gap-3 pt-4">
                        <button type="button" onclick="closeRequestModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg transition">Cancel</button>
                        <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-lg shadow-blue-600/30">Submit Request</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Request Detail Modal -->
    <div id="detailModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 py-8">
            <div class="fixed inset-0 bg-black/50 backdrop-blur-sm" onclick="closeDetailModal()"></div>
            <div class="relative bg-white rounded-2xl shadow-2xl max-w-3xl w-full slide-in">
                <div id="detailContent">
                    <!-- Dynamic detail content -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== STATE MANAGEMENT ====================
        let currentUser = null;
        let currentRole = null;
        let requests = [];
        let hrTeam = ['Sarah Chen', 'Mike Ross', 'Emily Watson', 'David Kim'];
        let notifications = [];
        let currentView = 'dashboard';

        const categories = [
            'Hiring & Recruitment', 'Onboarding', 'Compensation & Benefits', 
            'Training & Development', 'Employee Relations', 'Policy & Compliance',
            'Equipment & Access', 'Document Request', 'Other'
        ];

        const statusConfig = {
            'Pending': { color: 'status-pending', icon: 'clock', label: 'Pending' },
            'In Progress': { color: 'status-inprogress', icon: 'loader', label: 'In Progress' },
            'Waiting for Info': { color: 'status-waiting', icon: 'help-circle', label: 'Waiting for Info' },
            'Resolved': { color: 'status-resolved', icon: 'check-circle', label: 'Resolved' },
            'Closed': { color: 'status-closed', icon: 'archive', label: 'Closed' }
        };

        const priorityConfig = {
            'Urgent': 'priority-urgent',
            'High': 'priority-high',
            'Medium': 'priority-medium',
            'Low': 'priority-low'
        };

        // ==================== INITIALIZATION ====================
        function init() {
            loadData();
            lucide.createIcons();
        }

        function loadData() {
            const saved = localStorage.getItem('hrhub_data');
            if (saved) {
                const data = JSON.parse(saved);
                requests = data.requests || [];
                notifications = data.notifications || [];
            } else {
                // Seed demo data
                seedDemoData();
            }
        }

        function saveData() {
            localStorage.setItem('hrhub_data', JSON.stringify({
                requests,
                notifications,
                lastSave: new Date().toISOString()
            }));
        }

        function seedDemoData() {
            const now = new Date();
            requests = [
                {
                    id: 'REQ-001',
                    title: 'Urgent: Senior Developer Hiring Approval',
                    category: 'Hiring & Recruitment',
                    description: 'Engineering team needs to fill 2 senior developer positions for the Q3 product launch. Budget approved by CFO. Need job descriptions posted and interview panel set up by next week.',
                    requesterName: 'Alex Thompson',
                    requesterDept: 'Engineering',
                    priority: 'Urgent',
                    status: 'In Progress',
                    assignedTo: 'Sarah Chen',
                    createdAt: new Date(now - 86400000 * 2).toISOString(),
                    dueDate: new Date(now + 86400000 * 5).toISOString().split('T')[0],
                    comments: [
                        { id: 1, author: 'Sarah Chen', role: 'hr', text: 'Received! I'll draft the JDs and send for approval by EOD.', timestamp: new Date(now - 86400000 * 1.5).toISOString() },
                        { id: 2, author: 'Alex Thompson', role: 'dept', text: 'Thanks Sarah. Can we also include React and Node.js as required skills?', timestamp: new Date(now - 86400000).toISOString() },
                        { id: 3, author: 'Sarah Chen', role: 'hr', text: 'Absolutely, adding those to the requirements. Interview panel suggestions?', timestamp: new Date(now - 86400000 * 0.5).toISOString() }
                    ]
                },
                {
                    id: 'REQ-002',
                    title: 'Sales Team Onboarding Package',
                    category: 'Onboarding',
                    description: 'Need onboarding materials prepared for 3 new sales reps starting Monday. Includes laptop setup, CRM access, and sales playbook.',
                    requesterName: 'Maria Garcia',
                    requesterDept: 'Sales',
                    priority: 'High',
                    status: 'Pending',
                    assignedTo: null,
                    createdAt: new Date(now - 86400000).toISOString(),
                    dueDate: new Date(now + 86400000 * 3).toISOString().split('T')[0],
                    comments: []
                },
                {
                    id: 'REQ-003',
                    title: 'Q2 Performance Review Training',
                    category: 'Training & Development',
                    description: 'Requesting training session for all managers on conducting effective performance reviews. Q2 reviews start in 3 weeks.',
                    requesterName: 'James Wilson',
                    requesterDept: 'Product',
                    priority: 'Medium',
                    status: 'Waiting for Info',
                    assignedTo: 'Emily Watson',
                    createdAt: new Date(now - 86400000 * 3).toISOString(),
                    dueDate: new Date(now + 86400000 * 14).toISOString().split('T')[0],
                    comments: [
                        { id: 1, author: 'Emily Watson', role: 'hr', text: 'Great initiative! How many managers are we talking about? Need to book a room.', timestamp: new Date(now - 86400000 * 2).toISOString() }
                    ]
                },
                {
                    id: 'REQ-004',
                    title: 'Update Remote Work Policy',
                    category: 'Policy & Compliance',
                    description: 'Legal team reviewed our current remote work policy and suggested updates regarding equipment liability and data security. Need HR to review and implement.',
                    requesterName: 'Lisa Park',
                    requesterDept: 'Legal',
                    priority: 'High',
                    status: 'In Progress',
                    assignedTo: 'Mike Ross',
                    createdAt: new Date(now - 86400000 * 4).toISOString(),
                    dueDate: new Date(now + 86400000 * 7).toISOString().split('T')[0],
                    comments: [
                        { id: 1, author: 'Mike Ross', role: 'hr', text: 'Working with Legal on this. Will have a draft by Thursday.', timestamp: new Date(now - 86400000 * 2).toISOString() }
                    ]
                },
                {
                    id: 'REQ-005',
                    title: 'Team Building Budget Request',
                    category: 'Compensation & Benefits',
                    description: 'Marketing team requesting $2,000 budget for quarterly team building event. 12 team members. Proposed date: July 15th.',
                    requesterName: 'Tom Bradley',
                    requesterDept: 'Marketing',
                    priority: 'Low',
                    status: 'Resolved',
                    assignedTo: 'David Kim',
                    createdAt: new Date(now - 86400000 * 5).toISOString(),
                    dueDate: new Date(now + 86400000 * 10).toISOString().split('T')[0],
                    comments: [
                        { id: 1, author: 'David Kim', role: 'hr', text: 'Approved! Please submit expense report with receipts after the event.', timestamp: new Date(now - 86400000 * 1).toISOString() },
                        { id: 2, author: 'Tom Bradley', role: 'dept', text: 'Thanks David! Will do.', timestamp: new Date(now - 86400000 * 0.8).toISOString() }
                    ]
                }
            ];
            saveData();
        }

        // ==================== AUTH ====================
        function setRole(role) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('border-blue-500', 'bg-blue-50');
                btn.classList.add('border-gray-200');
            });
            const btn = document.getElementById(role === 'hr' ? 'btnHR' : 'btnDeptHead');
            btn.classList.remove('border-gray-200');
            btn.classList.add('border-blue-500', 'bg-blue-50');
        }

        function performLogin() {
            const name = document.getElementById('loginName').value.trim();
            const dept = document.getElementById('loginDept').value;

            if (!name || !dept || !currentRole) {
                alert('Please fill in all fields and select your role');
                return;
            }

            if (currentRole === 'hr' && dept !== 'HR') {
                alert('HR Team members must select "Human Resources" as department');
                return;
            }

            currentUser = { name, dept, role: currentRole };
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('userInfo').textContent = `${name} • ${dept}`;

            renderSidebar();
            navigate('dashboard');
            lucide.createIcons();
        }

        function logout() {
            currentUser = null;
            currentRole = null;
            location.reload();
        }

        // ==================== NAVIGATION ====================
        function navigate(view) {
            currentView = view;
            renderSidebar();

            if (currentRole === 'hr') {
                switch(view) {
                    case 'dashboard': renderHRDashboard(); break;
                    case 'requests': renderAllRequests(); break;
                    case 'mytasks': renderMyTasks(); break;
                    case 'analytics': renderAnalytics(); break;
                }
            } else {
                switch(view) {
                    case 'dashboard': renderDeptDashboard(); break;
                    case 'requests': renderMyRequests(); break;
                    case 'new': openRequestModal(); break;
                }
            }
            lucide.createIcons();
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            const stats = document.getElementById('quickStats');

            if (currentRole === 'hr') {
                nav.innerHTML = `
                    <a href="#" onclick="navigate('dashboard')" class="sidebar-link ${currentView === 'dashboard' ? 'active' : ''} flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                        Dashboard
                    </a>
                    <a href="#" onclick="navigate('requests')" class="sidebar-link ${currentView === 'requests' ? 'active' : ''} flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                        <i data-lucide="inbox" class="w-4 h-4"></i>
                        All Requests
                        <span class="ml-auto bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded-full">${requests.length}</span>
                    </a>
                    <a href="#" onclick="navigate('mytasks')" class="sidebar-link ${currentView === 'mytasks' ? 'active' : ''} flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                        <i data-lucide="check-square" class="w-4 h-4"></i>
                        My Tasks
                        <span class="ml-auto bg-blue-100 text-blue-600 text-xs px-2 py-0.5 rounded-full">${requests.filter(r => r.assignedTo === currentUser.name && r.status !== 'Closed').length}</span>
                    </a>
                    <a href="#" onclick="navigate('analytics')" class="sidebar-link ${currentView === 'analytics' ? 'active' : ''} flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                        <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
                        Analytics
                    </a>
                `;

                const pending = requests.filter(r => r.status === 'Pending').length;
                const urgent = requests.filter(r => r.priority === 'Urgent' && r.status !== 'Closed').length;
                const resolved = requests.filter(r => r.status === 'Resolved').length;

                stats.innerHTML = `
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-500">Pending</span>
                        <span class="font-semibold text-orange-600">${pending}</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-1.5">
                        <div class="bg-orange-500 h-1.5 rounded-full" style="width: ${(pending/requests.length)*100 || 0}%"></div>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-500">Urgent</span>
                        <span class="font-semibold text-red-600">${urgent}</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-1.5">
                        <div class="bg-red-500 h-1.5 rounded-full" style="width: ${(urgent/requests.length)*100 || 0}%"></div>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-500">Resolved</span>
                        <span class="font-semibold text-green-600">${resolved}</span>
                    </div>
                `;
            } else {
                nav.innerHTML = `
                    <a href="#" onclick="navigate('dashboard')" class="sidebar-link ${currentView === 'dashboard' ? 'active' : ''} flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                        Dashboard
                    </a>
                    <a href="#" onclick="navigate('requests')" class="sidebar-link ${currentView === 'requests' ? 'active' : ''} flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                        <i data-lucide="file-text" class="w-4 h-4"></i>
                        My Requests
                    </a>
                    <a href="#" onclick="navigate('new')" class="sidebar-link ${currentView === 'new' ? 'active' : ''} flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i>
                        New Request
                    </a>
                `;

                const myReqs = requests.filter(r => r.requesterName === currentUser.name);
                const open = myReqs.filter(r => r.status !== 'Closed' && r.status !== 'Resolved').length;
                const resolved = myReqs.filter(r => r.status === 'Resolved').length;

                stats.innerHTML = `
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-500">My Open</span>
                        <span class="font-semibold text-blue-600">${open}</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-500">Resolved</span>
                        <span class="font-semibold text-green-600">${resolved}</span>

            e.preventDefault();
            const newReq = {

                title: document.getElementById('reqTitle').value,
                category: document.getElementById('reqCategory').value,
                description: document.getElementById('reqDescription').value,
                priority: document.getElementById('reqPriority').value,
                requesterName: currentUser.name,
                requesterDept: currentUser.dept,
                status: 'Pending',
                assignedTo: null,
                createdAt: new Date().toISOString(),
                dueDate: document.getElementById('reqDueDate').value,
                comments: []
            };

            requests.unshift(newReq);
            saveData();
            closeRequestModal();

            // Add notification for HR
            notifications.push({
                id: Date.now(),
                text: `New request from ${currentUser.name}: ${newReq.title}`,
                time: new Date().toISOString(),
                read: false
            });

            navigate(currentRole === 'hr' ? 'requests' : 'requests');
            lucide.createIcons();

                                                ${Object.keys(statusConfig).map(s => `<option value="${s}" ${req.status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                            </select>
                                        </div>
                                    ` : `
                                        <div>
                                            <span class="text-gray-500">Assigned To</span>
                                            <p class="font-medium text-gray-900">${req.assignedTo || 'Not yet assigned'}</p>
                                        </div>
                                    `}
                                </div>
                            </div>

                            ${canEdit ? `
                                <div class="bg-blue-50 rounded-xl p-4 border border-blue-100">
                                    <h3 class="text-xs font-semibold text-blue-600 uppercase tracking-wider mb-2">HR Actions</h3>
                                    <p class="text-xs text-blue-600 mb-3">Update status and assignment to collaborate with the department.</p>
                                </div>
                            ` : ''}

                            ${isOwner && (req.status === 'Resolved' || req.status === 'Closed') ? `
                                <button onclick="reopenRequest('${req.id}')" class="w-full py-2 border border-gray-300 text-gray-700 rounded-lg text-sm hover:bg-gray-50 transition">
                                    Reopen Request
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('detailContent').innerHTML = html;
            document.getElementById('detailModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        // ==================== ACTIONS ====================
        function addComment(reqId) {
            const text = document.getElementById('commentText').value.trim();
            if (!text) return;

            const req = requests.find(r => r.id === reqId);
            req.comments.push({
                id: Date.now(),
                author: currentUser.name,
                role: currentRole,
                text: text,
                timestamp: new Date().toISOString()
            });

            saveData();
            openDetailModal(reqId);
        }

        function updateStatus(reqId, status) {
            const req = requests.find(r => r.id === reqId);
            req.status = status;
            saveData();

            // Notify requester
            if (status === 'Resolved') {
                notifications.push({
                    id: Date.now(),
                    text: `Your request ${reqId} has been resolved`,
                    time: new Date().toISOString(),
                    read: false
                });
            }

            openDetailModal(reqId);
            renderSidebar();
        }

        function assignRequest(reqId, assignee) {
            const req = requests.find(r => r.id === reqId);
            req.assignedTo = assignee || null;
            if (assignee && req.status === 'Pending') req.status = 'In Progress';
            saveData();
            openDetailModal(reqId);
            renderSidebar();
        }

        function reopenRequest(reqId) {
            const req = requests.find(r => r.id === reqId);
            req.status = 'Pending';
            req.assignedTo = null;
            saveData();
            openDetailModal(reqId);
        }

        function showNotifications() {
            const unread = notifications.filter(n => !n.read);
            alert(`You have ${unread.length} unread notifications.

${unread.slice(0, 3).map(n => '• ' + n.text).join('\n')}`);
            unread.forEach(n => n.read = true);
            document.getElementById('notifBadge').classList.add('hidden');
        }

        // ==================== UTILS ====================
        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days}d ago`;
            return date.toLocaleDateString();
        }

        // Start
        init();
    </script>
</body>
</html>
